name: Build APK SocialFeed

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK and AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Create Gradle Wrapper
        working-directory: android-app
        run: |
          # Download gradle-wrapper.jar if missing
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Downloading gradle-wrapper.jar..."
            mkdir -p gradle/wrapper
            wget -q "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
              -O gradle/wrapper/gradle-wrapper.jar
            echo "gradle-wrapper.jar downloaded ($(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes)"
          fi
          # Generate gradlew if missing
          if [ ! -f gradlew ]; then
            echo "Downloading Gradle 8.4 to generate wrapper..."
            wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
            /tmp/gradle-dist/gradle-8.4/bin/gradle wrapper --gradle-version=8.4
          fi
          # Fix DEFAULT_JVM_OPTS to avoid quoting issues
          sed -i "s/DEFAULT_JVM_OPTS=.*$/DEFAULT_JVM_OPTS='-Xmx4096m -Xms512m'/" gradlew
          chmod +x gradlew
          echo "DEFAULT_JVM_OPTS: $(grep 'DEFAULT_JVM_OPTS=' gradlew | head -1)"
          echo "wrapper jar: $(ls -la gradle/wrapper/gradle-wrapper.jar)"
          echo "gradlew ready"

      - name: Decode Keystore
        run: |
          mkdir -p android-app/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android-app/keystore/socialfeed-release.jks

      - name: Create google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android-app/app/google-services.json

      - name: Create Android resources
        run: |
          python3 << 'PYEOF'
          import os

          base = "android-app/app/src/main/res"
          dirs = [
            f"{base}/drawable",
            f"{base}/mipmap-hdpi", f"{base}/mipmap-mdpi",
            f"{base}/mipmap-xhdpi", f"{base}/mipmap-xxhdpi", f"{base}/mipmap-xxxhdpi",
            f"{base}/values"
          ]
          for d in dirs:
              os.makedirs(d, exist_ok=True)

          files = {
            f"{base}/drawable/ic_notification.xml": '''<?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp" android:height="24dp"
              android:viewportWidth="24" android:viewportHeight="24">
            <path android:fillColor="#FFFFFF"
                android:pathData="M12,22c1.1,0 2,-0.9 2,-2h-4c0,1.1 0.9,2 2,2zM18,16v-5c0,-3.07-1.64,-5.64-4.5,-6.32V4c0,-0.83-0.67,-1.5-1.5,-1.5s-1.5,0.67-1.5,1.5v0.68C7.63,5.36 6,7.92 6,11v5l-2,2v1h16v-1l-2,-2z"/>
          </vector>''',
            f"{base}/drawable/ic_default_avatar.xml": '''<?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="44dp" android:height="44dp"
              android:viewportWidth="44" android:viewportHeight="44">
            <path android:fillColor="#1877F2" android:pathData="M22,22m-22,0a22,22 0,1 1,44 0a22,22 0,1 1,-44 0"/>
            <path android:fillColor="#FFFFFF" android:pathData="M22,12a6,6 0,1 0,0 12a6,6 0,0 0,0-12zM10,30c0,-4 5.4,-7 12,-7s12,3 12,7v2H10v-2z"/>
          </vector>''',
            f"{base}/drawable/bg_card.xml": '''<?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#FFFFFF"/>
            <corners android:radius="12dp"/>
            <stroke android:width="1dp" android:color="#E4E6EB"/>
          </shape>''',
            f"{base}/drawable/bg_input_rounded.xml": '''<?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#F0F2F5"/>
            <corners android:radius="24dp"/>
          </shape>''',
            f"{base}/drawable/bg_btn_circle.xml": '''<?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
            <solid android:color="#1877F2"/>
          </shape>''',
            f"{base}/values/colors.xml": '''<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="primary">#1877F2</color>
              <color name="primaryDark">#166FE5</color>
              <color name="accent">#42B72A</color>
              <color name="background">#F0F2F5</color>
              <color name="white">#FFFFFF</color>
              <color name="text">#1C1E21</color>
              <color name="textSecondary">#65676B</color>
          </resources>''',
          }

          launcher_xml = '''<?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@color/primary"/>
            <foreground android:drawable="@drawable/ic_notification"/>
          </adaptive-icon>'''

          for density in ["hdpi","mdpi","xhdpi","xxhdpi","xxxhdpi"]:
              files[f"{base}/mipmap-{density}/ic_launcher.xml"] = launcher_xml
              files[f"{base}/mipmap-{density}/ic_launcher_round.xml"] = launcher_xml

          for path, content in files.items():
              with open(path, 'w') as f:
                  f.write(content)

          print("Resources created successfully")
          PYEOF

      - name: Create Hilt module
        run: |
          mkdir -p android-app/app/src/main/java/com/socialfeed/app/di
          mkdir -p android-app/app/src/main/java/com/socialfeed/app/services

          python3 -c "
          content = '''package com.socialfeed.app.di

          import com.google.firebase.auth.FirebaseAuth
          import com.google.firebase.firestore.FirebaseFirestore
          import com.google.firebase.storage.FirebaseStorage
          import dagger.Module
          import dagger.Provides
          import dagger.hilt.InstallIn
          import dagger.hilt.components.SingletonComponent
          import javax.inject.Singleton

          @Module
          @InstallIn(SingletonComponent::class)
          object AppModule {
              @Provides @Singleton
              fun provideFirebaseAuth(): FirebaseAuth = FirebaseAuth.getInstance()
              @Provides @Singleton
              fun provideFirestore(): FirebaseFirestore = FirebaseFirestore.getInstance()
              @Provides @Singleton
              fun provideStorage(): FirebaseStorage = FirebaseStorage.getInstance()
          }'''
          with open('android-app/app/src/main/java/com/socialfeed/app/di/AppModule.kt','w') as f:
              f.write(content)
          print('AppModule created')
          "

          python3 -c "
          content = '''package com.socialfeed.app.services

          import com.google.firebase.messaging.FirebaseMessagingService
          import com.google.firebase.messaging.RemoteMessage
          import com.google.firebase.auth.FirebaseAuth
          import com.google.firebase.firestore.FirebaseFirestore

          class FCMService : FirebaseMessagingService() {
              override fun onNewToken(token: String) {
                  val uid = FirebaseAuth.getInstance().currentUser?.uid ?: return
                  FirebaseFirestore.getInstance().collection(\"users\").document(uid).update(\"fcmToken\", token)
              }
              override fun onMessageReceived(message: RemoteMessage) {}
          }'''
          with open('android-app/app/src/main/java/com/socialfeed/app/services/FCMService.kt','w') as f:
              f.write(content)
          print('FCMService created')
          "

      - name: Build Debug APK
        working-directory: android-app
        env:
          KEYSTORE_PATH: keystore/socialfeed-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: socialfeed
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release AAB
        working-directory: android-app
        env:
          KEYSTORE_PATH: keystore/socialfeed-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: socialfeed
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SocialFeed-Debug-APK
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SocialFeed-Release-AAB
          path: android-app/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Build Summary
        if: success()
        run: |
          echo "BUILD SUCCESS"
          echo "APK Debug: app/build/outputs/apk/debug/app-debug.apk"
          echo "AAB Release: app/build/outputs/bundle/release/app-release.aab"
          echo "Download from Actions tab > Artifacts"
